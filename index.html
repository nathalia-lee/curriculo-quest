<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currículo Quest 🍄</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:#5C94FC;--ground:#C84B11;--brick:#E86820;--coin:#FFD700;--green:#5ACE5A;--white:#fff;--dark:#1a1a2e;--grass:#43b14b}
body{font-family:'Nunito',sans-serif;background:var(--sky);min-height:100vh;overflow-x:hidden}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.bg-scene{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.cloud{position:absolute;background:var(--white);border-radius:20px}
.cloud::before,.cloud::after{content:'';position:absolute;background:var(--white);border-radius:50%}
.cloud1{width:80px;height:24px;top:10%;left:10%;animation:floatCloud 20s linear infinite}
.cloud1::before{width:40px;height:40px;top:-20px;left:10px}
.cloud1::after{width:30px;height:30px;top:-12px;left:30px}
.cloud2{width:60px;height:18px;top:15%;left:55%;animation:floatCloud 28s linear infinite 5s}
.cloud2::before{width:30px;height:30px;top:-15px;left:8px}
.cloud2::after{width:22px;height:22px;top:-10px;left:22px}
.cloud3{width:100px;height:28px;top:8%;left:80%;animation:floatCloud 22s linear infinite 10s}
.cloud3::before{width:50px;height:50px;top:-25px;left:12px}
.cloud3::after{width:38px;height:38px;top:-16px;left:38px}
@keyframes floatCloud{from{transform:translateX(0)}to{transform:translateX(-120vw)}}
.ground-strip{position:fixed;bottom:0;left:0;width:100%;height:48px;background:var(--ground);z-index:0}
.ground-strip::before{content:'';position:absolute;top:0;left:0;width:100%;height:8px;background:var(--grass)}
.game-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 80px}
.game-header{width:100%;max-width:640px;text-align:center;padding:12px 0 8px}
.game-title{font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,16px);color:var(--white);text-shadow:3px 3px 0 #333;letter-spacing:1px;line-height:1.8}
.game-sub{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.8vw,10px);color:var(--coin);text-shadow:2px 2px 0 #333;margin-top:4px}
.hud{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:640px;padding:8px 12px;background:rgba(0,0,0,0.55);border-radius:8px;margin:8px 0 16px;gap:8px;flex-wrap:wrap}
.hud-item{display:flex;align-items:center;gap:6px;font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.5vw,9px);color:var(--white)}
.lives{display:flex;gap:3px}
.heart{width:14px;height:14px;background:red;clip-path:polygon(50% 90%, 0% 30%, 15% 10%, 50% 30%, 85% 10%, 100% 30%)}
.progress-wrap{width:100%;max-width:640px;margin-bottom:16px}
.progress-label{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.4vw,8px);color:var(--white);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-track{width:100%;height:18px;background:rgba(0,0,0,0.4);border-radius:9px;overflow:hidden;border:2px solid rgba(255,255,255,0.3)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--coin),#ff9900);border-radius:9px;transition:width .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
.progress-mario{font-size:14px;animation:runMario .4s steps(1) infinite}
@keyframes runMario{0%,100%{transform:scaleX(1)}50%{transform:scaleX(-1)}}
.stage-card{width:100%;max-width:640px;background:rgba(255,255,255,0.97);border-radius:16px;box-shadow:0 8px 0 rgba(0,0,0,0.35),0 12px 0 rgba(0,0,0,0.1);padding:24px 20px 20px;position:relative;overflow:hidden}
.stage-badge{display:inline-flex;align-items:center;gap:6px;background:var(--brick);color:var(--white);font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.5vw,8px);padding:5px 10px;border-radius:20px;margin-bottom:12px;text-shadow:1px 1px 0 rgba(0,0,0,0.4)}
.stage-title{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2vw,13px);color:var(--dark);margin-bottom:6px;line-height:1.6}
.stage-desc{font-size:13px;color:#555;margin-bottom:18px;line-height:1.5}
.field-group{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.field-row{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.4vw,8px);color:#333;line-height:1.5}
.field input,.field textarea,.field select{padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-family:'Nunito',sans-serif;font-size:14px;color:#222;background:#fafafa;transition:border-color .2s,box-shadow .2s;resize:none;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--brick);box-shadow:0 0 0 3px rgba(232,104,32,.15)}
.field textarea{min-height:80px;line-height:1.5}
.repeat-block{background:#f8f8f8;border:2px dashed #ddd;border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.repeat-block-title{font-family:'Press Start 2P',monospace;font-size:7px;color:#777;margin-bottom:10px}
.remove-btn{position:absolute;top:8px;right:8px;background:#e74c3c;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.add-btn{display:flex;align-items:center;gap:6px;background:transparent;border:2px dashed var(--brick);color:var(--brick);font-family:'Press Start 2P',monospace;font-size:7px;padding:8px 12px;border-radius:8px;cursor:pointer;width:100%;justify-content:center;transition:background .2s}
.add-btn:hover{background:rgba(232,104,32,.08)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;border:2px solid #ddd;border-radius:8px;background:#fafafa;min-height:42px;cursor:text;transition:border-color .2s}
.tags-wrap:focus-within{border-color:var(--brick)}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--brick);color:#fff;font-size:12px;padding:3px 8px;border-radius:20px;font-weight:700}
.tag button{background:none;border:none;color:#fff;cursor:pointer;font-size:13px;padding:0;line-height:1;opacity:.8}
.tag-input{border:none;outline:none;background:transparent;font-family:'Nunito',sans-serif;font-size:14px;min-width:100px;flex:1}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.5vw,9px);padding:12px 18px;border-radius:8px;border:none;cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:0 4px 0 rgba(0,0,0,0.3);line-height:1.4}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,0.3)}
.btn-next{background:var(--green);color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.3)}
.btn-prev{background:#888;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.3)}
.btn-generate{background:#e74c3c;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.3);animation:pulseBtn 1s ease-in-out infinite}
@keyframes pulseBtn{0%,100%{box-shadow:0 4px 0 rgba(0,0,0,.3)}50%{box-shadow:0 4px 0 rgba(0,0,0,.3),0 0 18px rgba(231,76,60,.6)}}
.coin-pop{position:fixed;font-size:28px;pointer-events:none;animation:coinUp .7s ease-out forwards;z-index:999}
@keyframes coinUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}
.stages-row{display:flex;gap:8px;justify-content:center;width:100%;max-width:640px;margin-bottom:14px;flex-wrap:wrap}
.stage-dot{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:8px;border:2px solid rgba(255,255,255,.4);transition:all .3s}
.stage-dot.done{background:var(--coin);color:#333;border-color:var(--coin);box-shadow:0 0 8px var(--coin)}
.stage-dot.current{background:rgba(255,255,255,.9);color:var(--brick);border-color:var(--white);box-shadow:0 0 12px rgba(255,255,255,.6);animation:bounce .5s ease-in-out infinite alternate}
.stage-dot.todo{background:rgba(0,0,0,.25);color:rgba(255,255,255,.5)}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.victory{text-align:center;padding:20px 0}
.victory h2{font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,16px);color:var(--dark);margin-bottom:12px}
.victory p{font-size:14px;color:#555;margin-bottom:20px;line-height:1.6}
.score-box{background:var(--dark);color:var(--coin);font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.5vw,9px);padding:12px 16px;border-radius:8px;margin:12px 0;text-align:left;line-height:2.2;overflow-x:auto}
.trophy{font-size:60px;display:block;margin:0 auto 12px;animation:spinY .5s ease}
@keyframes spinY{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
.sending-overlay{position:absolute;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:16px;z-index:10}
.spinner{width:40px;height:40px;border:4px solid #ddd;border-top-color:var(--brick);border-radius:50%;animation:spin2 .8s linear infinite}
@keyframes spin2{to{transform:rotate(360deg)}}
.sending-text{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--dark);margin-top:12px;text-align:center;line-height:2}
.success-msg{background:#e8f5e9;border:2px solid #4caf50;border-radius:10px;padding:12px 16px;font-family:'Press Start 2P',monospace;font-size:8px;color:#2e7d32;text-align:center;margin-top:12px;line-height:2;display:none}
.error-msg{background:#fce4ec;border:2px solid #e74c3c;border-radius:10px;padding:12px 16px;font-family:'Press Start 2P',monospace;font-size:8px;color:#b71c1c;text-align:center;margin-top:12px;line-height:2;display:none}
.btn-download{background:#3498db;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.3);display:none}
</style>
</head>
<body>
<h2 class="sr-only">Gerador de Currículo Gamificado</h2>
<div class="bg-scene">
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="ground-strip"></div>
</div>
<div class="game-wrap">
  <div class="game-header">
    <div class="game-title">🍄 CURRÍCULO QUEST</div>
    <div class="game-sub">⭐ CONSTRUA SEU HERÓI PROFISSIONAL ⭐</div>
  </div>
  <div class="hud">
    <div class="hud-item"><span>🏆</span><span>PONTOS: <span id="score">0</span></span></div>
    <div class="hud-item"><span>📋</span><span>FASE <span id="current-stage-num">1</span>/8</span></div>
    <div class="hud-item"><span>VIDAS: </span><div class="lives"><div class="heart"></div><div class="heart"></div><div class="heart"></div></div></div>
  </div>
  <div class="stages-row" id="stages-row"></div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">MUNDO 1-1</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"><span class="progress-mario">🏃</span></div></div>
  </div>
  <div class="stage-card" id="stage-card">
    <div id="stage-content"></div>
  </div>
</div>

<script>
// ⚠️ TROQUE PELA URL DO SEU WEBHOOK NO N8N
const WEBHOOK_URL = 'https://tarot-manifesto-aged.ngrok-free.dev/webhook/gerar-curriculo';;

const stages = [
  {id:'pessoal',icon:'👤',label:'1-1',title:'DADOS PESSOAIS',desc:'Vamos começar com quem é você, herói!',
   fields:[
    {id:'nome',label:'NOME COMPLETO',type:'text',placeholder:'Seu nome completo',full:true,required:true},
    {id:'titulo',label:'TÍTULO / PROFISSÃO',type:'text',placeholder:'Ex: Analista de Marketing',full:true,required:true},
    {id:'email',label:'E-MAIL',type:'email',placeholder:'seuemail@exemplo.com',required:true},
    {id:'telefone',label:'TELEFONE',type:'text',placeholder:'(00) 00000-0000',required:true},
    {id:'cidade',label:'CIDADE / ESTADO',type:'text',placeholder:'Sua cidade, UF',required:true},
    {id:'linkedin',label:'LINKEDIN (opcional)',type:'text',placeholder:'linkedin.com/in/seuperfil'},
   ]},
  {id:'objetivo',icon:'🎯',label:'1-2',title:'RESUMO PROFISSIONAL',desc:'Qual é a sua missão? Descreva você em um parágrafo!',
   fields:[
    {id:'resumo',label:'RESUMO PROFISSIONAL',type:'textarea',placeholder:'Descreva sua trajetória, seus pontos fortes e o que você busca profissionalmente...',full:true,required:true},
   ]},
  {id:'formacao',icon:'🎓',label:'1-3',title:'FORMAÇÃO ACADÊMICA',desc:'Colete os certificados da fase acadêmica!',type:'repeat',repeatLabel:'FORMAÇÃO',
   fields:[
    {id:'curso',label:'CURSO',type:'text',placeholder:'Nome do curso',required:true},
    {id:'instituicao',label:'INSTITUIÇÃO',type:'text',placeholder:'Nome da instituição',required:true},
    {id:'periodo',label:'PERÍODO',type:'text',placeholder:'2020 - 2024'},
    {id:'disciplinas',label:'DISCIPLINAS RELEVANTES (opcional)',type:'text',placeholder:'Liste as principais disciplinas'},
    {id:'media',label:'MÉDIA GERAL (opcional)',type:'text',placeholder:'Ex: 8.5'},
   ]},
  {id:'experiencia',icon:'💼',label:'2-1',title:'EXPERIÊNCIA PROFISSIONAL',desc:'Mostre os chefes que você já derrotou!',type:'repeat',repeatLabel:'EXPERIÊNCIA',
   fields:[
    {id:'cargo',label:'CARGO',type:'text',placeholder:'Nome do cargo',required:true},
    {id:'empresa',label:'EMPRESA',type:'text',placeholder:'Nome da empresa',required:true},
    {id:'periodo',label:'PERÍODO',type:'text',placeholder:'2022 - 2024'},
    {id:'descricao',label:'ATIVIDADES REALIZADAS',type:'textarea',placeholder:'Descreva suas principais responsabilidades e conquistas nessa posição...'},
   ]},
  {id:'dados_extras',icon:'📋',label:'2-2',title:'DADOS PESSOAIS',desc:'Informações extras para o sidebar do currículo!',
   fields:[
    {id:'nascimento',label:'DATA DE NASCIMENTO',type:'text',placeholder:'DD de mês de AAAA'},
    {id:'genero',label:'GÊNERO',type:'select',options:['','Masculino','Feminino','Não-binário','Prefiro não informar']},
    {id:'cnh',label:'CARTEIRA DE MOTORISTA (opcional)',type:'select',options:['','Não possuo','A','B','AB','C','D','E']},
   ]},
  {id:'competencias',icon:'⚔️',label:'2-3',title:'COMPETÊNCIAS',desc:'Quais são seus poderes especiais?',type:'tags',
   tagGroups:[
    {id:'competencias',label:'COMPETÊNCIAS TÉCNICAS',placeholder:'Digite uma competência e pressione Enter'},
    {id:'sistemas',label:'SISTEMAS / SOFTWARES',placeholder:'Digite um sistema e pressione Enter'},
   ]},
  {id:'qualidades',icon:'✨',label:'3-1',title:'QUALIDADES',desc:'Seus atributos de personagem!',type:'tags',
   tagGroups:[
    {id:'qualidades',label:'QUALIDADES / SOFT SKILLS',placeholder:'Digite uma qualidade e pressione Enter'},
    {id:'idiomas',label:'IDIOMAS',placeholder:'Ex: Inglês intermediário — pressione Enter'},
   ]},
  {id:'revisao',icon:'🏆',label:'3-2',title:'REVISÃO FINAL',desc:'Confira tudo e gere seu currículo!',type:'review'}
];

let currentStage=0,formData={},score=0;

function getOrInit(id){
  if(!formData[id]){const s=stages.find(x=>x.id===id);formData[id]=s.type==='repeat'?[]:{}}
  return formData[id];
}
function addScore(p){score+=p;document.getElementById('score').textContent=score;}
function showCoin(el){
  if(!el)return;
  const r=el.getBoundingClientRect();
  const d=document.createElement('div');d.className='coin-pop';d.textContent='🪙';
  d.style.left=(r.left+r.width/2-14)+'px';d.style.top=(r.top-10)+'px';
  document.body.appendChild(d);setTimeout(()=>d.remove(),800);
}
function updateProgress(){
  const pct=Math.round((currentStage/(stages.length-1))*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('current-stage-num').textContent=currentStage+1;
  document.getElementById('progress-text').textContent='MUNDO '+stages[currentStage].label;
  const row=document.getElementById('stages-row');row.innerHTML='';
  stages.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='stage-dot '+(i<currentStage?'done':i===currentStage?'current':'todo');
    d.textContent=i<currentStage?'✓':s.icon;d.title=s.title;row.appendChild(d);
  });
}
function renderStage(){
  const s=stages[currentStage];
  updateProgress();
  const card=document.getElementById('stage-content');
  if(s.type==='review'){renderReview(card);return;}
  let html=`<div class="stage-badge">${s.icon} FASE ${s.label}</div>
    <div class="stage-title">${s.title}</div>
    <div class="stage-desc">${s.desc}</div>`;
  if(s.type==='repeat')html+=renderRepeat(s);
  else if(s.type==='tags')html+=renderTags(s);
  else html+=renderFields(s);
  html+=`<div class="btn-row">
    ${currentStage>0?`<button class="btn btn-prev" onclick="prevStage()">◀ VOLTAR</button>`:''}
    <button class="btn btn-next" onclick="nextStage()" id="btn-next">PRÓXIMO ▶</button>
  </div>`;
  card.innerHTML=html;
  if(s.type==='tags')initTags(s);
  restoreRepeat(s);
}
function renderFields(s){
  const data=getOrInit(s.id);let html='<div class="field-group">';let i=0;
  while(i<s.fields.length){
    const f=s.fields[i];
    if(f.full){html+=`<div class="field">${fieldHTML(f,data[f.id]||'')}</div>`;i++;}
    else if(i+1<s.fields.length&&!s.fields[i+1].full){
      html+=`<div class="field-row"><div class="field">${fieldHTML(f,data[f.id]||'')}</div><div class="field">${fieldHTML(s.fields[i+1],data[s.fields[i+1].id]||'')}</div></div>`;i+=2;
    }else{html+=`<div class="field">${fieldHTML(f,data[f.id]||'')}</div>`;i++;}
  }
  return html+'</div>';
}
function fieldHTML(f,val){
  const lbl=`<label for="f_${f.id}">${f.label}${f.required?' <span style="color:red">*</span>':''}</label>`;
  if(f.type==='textarea')return lbl+`<textarea id="f_${f.id}" placeholder="${f.placeholder||''}" oninput="saveField('${f.id}',this.value)">${val}</textarea>`;
  if(f.type==='select')return lbl+`<select id="f_${f.id}" onchange="saveField('${f.id}',this.value)">${f.options.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select>`;
  return lbl+`<input type="${f.type}" id="f_${f.id}" value="${val}" placeholder="${f.placeholder||''}" oninput="saveField('${f.id}',this.value)">`;
}
function saveField(id,val){getOrInit(stages[currentStage].id)[id]=val;addScore(1);}
function renderRepeat(s){return`<div id="repeat-container"></div><button class="add-btn" onclick="addRepeatItem()">+ ADICIONAR ${s.repeatLabel}</button>`;}
function restoreRepeat(s){
  if(s.type!=='repeat')return;
  const data=getOrInit(s.id);
  if(data.length===0){addRepeatItem();return;}
  data.forEach((_,i)=>addRepeatItem(i,true));
}
function addRepeatItem(existingIdx,restore){
  const s=stages[currentStage];const data=getOrInit(s.id);
  const idx=restore?existingIdx:data.length;
  if(!restore)data.push({});
  const c=document.getElementById('repeat-container');
  const div=document.createElement('div');div.className='repeat-block';div.dataset.idx=idx;
  const item=data[idx]||{};
  let html=`<div class="repeat-block-title">${s.repeatLabel} ${idx+1}</div>`;
  s.fields.forEach(f=>{html+=`<div class="field" style="margin-bottom:10px">${fieldHTMLRepeat(f,item[f.id]||'',idx)}</div>`;});
  div.innerHTML=html;
  if(data.length>1||!restore){
    const rm=document.createElement('button');rm.className='remove-btn';rm.textContent='×';
    rm.onclick=()=>{data.splice(idx,1);renderStage();};div.appendChild(rm);
  }
  c.appendChild(div);if(!restore)addScore(5);
}
function fieldHTMLRepeat(f,val,idx){
  const lbl=`<label>${f.label}${f.required?' <span style="color:red">*</span>':''}</label>`;
  if(f.type==='textarea')return lbl+`<textarea placeholder="${f.placeholder||''}" oninput="saveRepeat('${f.id}',${idx},this.value)">${val}</textarea>`;
  return lbl+`<input type="${f.type}" value="${val}" placeholder="${f.placeholder||''}" oninput="saveRepeat('${f.id}',${idx},this.value)">`;
}
function saveRepeat(field,idx,val){const s=stages[currentStage];const data=getOrInit(s.id);if(!data[idx])data[idx]={};data[idx][field]=val;addScore(1);}
function renderTags(s){
  return s.tagGroups.map(g=>`<div class="field" style="margin-bottom:16px">
    <label>${g.label}</label>
    <div class="tags-wrap" id="tags_${g.id}" onclick="document.getElementById('tag-input-${g.id}').focus()">
      <input class="tag-input" id="tag-input-${g.id}" placeholder="${g.placeholder}" onkeydown="handleTagInput(event,'${g.id}')">
    </div></div>`).join('');
}
function initTags(s){
  const data=getOrInit(s.id);
  s.tagGroups.forEach(g=>{if(!data[g.id])data[g.id]=[];data[g.id].forEach(tag=>addTagToDOM(g.id,tag,false));});
}
function handleTagInput(e,groupId){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();const input=e.target;const val=input.value.trim().replace(/,$/,'');
    if(val){addTagToDOM(groupId,val,true);input.value='';}
  }
}
function addTagToDOM(groupId,val,save){
  const s=stages[currentStage];const data=getOrInit(s.id);
  if(!data[groupId])data[groupId]=[];
  if(save){data[groupId].push(val);addScore(3);showCoin(document.getElementById('tags_'+groupId));}
  const wrap=document.getElementById('tags_'+groupId);const input=document.getElementById('tag-input-'+groupId);
  const tag=document.createElement('span');tag.className='tag';
  tag.innerHTML=val+`<button onclick="removeTag('${groupId}','${val}',this.parentNode)">×</button>`;
  wrap.insertBefore(tag,input);
}
function removeTag(groupId,val,el){
  el.remove();const s=stages[currentStage];const data=getOrInit(s.id);
  data[groupId]=data[groupId].filter(x=>x!==val);
}
function collectCurrentTagStage(){
  const s=stages[currentStage];if(s.type!=='tags')return;
  const data=getOrInit(s.id);s.tagGroups.forEach(g=>{if(!data[g.id])data[g.id]=[];});
}

        > TELEFONE: ${p.telefone||'—'}<br>

    </div>`;
}
function nextStage(){
  collectCurrentTagStage();showCoin(document.getElementById('btn-next'));addScore(10);
  if(currentStage<stages.length-1){currentStage++;renderStage();document.getElementById('stage-card').scrollIntoView({behavior:'smooth',block:'start'});}
}
function prevStage(){
  if(currentStage>0){currentStage--;renderStage();document.getElementById('stage-card').scrollIntoView({behavior:'smooth',block:'start'});}
}

// Armazena o PDF recebido para download
let pdfBase64 = null;
let pdfNome = 'curriculo.pdf';

async function generate(){
  const overlay=document.getElementById('sending-overlay');
  const btn=document.getElementById('btn-generate');
  const successMsg=document.getElementById('success-msg');
  const errorMsg=document.getElementById('error-msg');
  errorMsg.style.display='none';
  overlay.style.display='flex';
  btn.disabled=true;

  const payload={
    dados_pessoais: formData.pessoal||{},
    resumo_profissional: (formData.objetivo||{}).resumo||'',
    formacao: formData.formacao||[],
    experiencia: formData.experiencia||[],
    dados_extras: formData.dados_extras||{},
    competencias: (formData.competencias||{}).competencias||[],
    sistemas: (formData.competencias||{}).sistemas||[],
    qualidades: (formData.qualidades||{}).qualidades||[],
    idiomas: (formData.qualidades||{}).idiomas||[],
    meta: {score, gerado_em: new Date().toISOString()}
  };

  try{
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);

    // O n8n deve responder com JSON: { "pdf": "<base64>", "nome": "curriculo-joao.pdf" }
    const data = await res.json();
    overlay.style.display='none';

    if(data.pdf){
      pdfBase64 = data.pdf;
      pdfNome = data.nome || ((formData.pessoal||{}).nome||'curriculo').replace(/\s+/g,'-').toLowerCase()+'.pdf';
      successMsg.style.display='block';
      addScore(100);
      // Mostra botão de download e faz download automático
      document.getElementById('btn-download').style.display='inline-flex';
      downloadPDF();
    } else {
      throw new Error('PDF não recebido');
    }
  }catch(e){
    overlay.style.display='none';
    btn.disabled=false;
    errorMsg.style.display='block';
    console.error('Erro webhook:',e);
  }
}

function downloadPDF(){
  if(!pdfBase64) return;
  // Converte base64 para blob e faz download
  const byteChars = atob(pdfBase64);
  const byteNums = new Array(byteChars.length);
  for(let i=0;i<byteChars.length;i++) byteNums[i]=byteChars.charCodeAt(i);
  const blob = new Blob([new Uint8Array(byteNums)],{type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=pdfNome; a.click();
  URL.revokeObjectURL(url);
  showCoin(document.getElementById('btn-download'));
}

renderStage();
